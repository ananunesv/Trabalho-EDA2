name: coleta

# Pipeline OFFLINE: roda a cada 12h (sem usuário presente).
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  coleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        working-directory: newsgraph
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download pt_core_news_sm

      - name: Rodar pipeline (coleta RSS + PLN -> banco)
        working-directory: newsgraph
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: .
        run: python -m pipeline.run_coleta
